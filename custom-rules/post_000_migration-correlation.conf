# Regla que actualiza el Score de la Aplicación en Migración
SecAction "id:191920,\
    phase:5,\
    pass,\
    t:none,\
    nolog,\
    noauditlog,\
    setvar:tx.inbound_anomaly_score_migration=%{tx.inbound_anomaly_score_pl1_migration},\
    setvar:tx.inbound_anomaly_score_migration=+%{tx.inbound_anomaly_score_pl2_migration}"


# Regla de monitoreo para uso de la migracion
SecRule TX:INBOUND_ANOMALY_SCORE_MIGRATION "@gt 0" \
    "id:191950,\
    phase:5,\
    pass,\
    t:none,\
    log,\
    noauditlog,\
    msg:'Aplication Inbound Score (Total Inbound Score: %{tx.inbound_anomaly_score_migration}): ; Individual inbound paranoia level scores: %{tx.inbound_anomaly_score_pl1_migration}, %{tx.inbound_anomaly_score_pl2_migration}, %{tx.app_inbound_anomaly_score_pl3}, %{tx.app_inbound_anomaly_score_pl4}; Aplication Outbound Score (Total Outbound Score: %{tx.app_outbound_anomaly_score}: %{tx.msg}; Individual outbound paranoia level scores: %{TX.OUTBOUND_ANOMALY_SCORE_PL1}, %{TX.OUTBOUND_ANOMALY_SCORE_PL2}, %{TX.OUTBOUND_ANOMALY_SCORE_PL3}, %{TX.OUTBOUND_ANOMALY_SCORE_PL4}',\
    tag:'Webappid: %{webappid}',\
    tag:'Blocking-PL=%{tx.paranoia_level}',\
    tag:'Loging-PL=%{tx.executing_paranoia_level}',\
    tag:'Tuning-PL1=%{tx.tuning_PL1}',\
    tag:'Tuning-PL2=%{tx.tuning_pl2}',\
    tag:'BlockedBy=%{tx.app_blocked}',\
    tag:'VirtualPatching=%{tx.vp_score}',\
    tag:'Inbound-Threshold=%{tx.inbound_anomaly_score_threshold}',\
    tag:'Outbound-Threshold=%{tx.outbound_anomaly_score_threshold}',\
    tag:'event-monitor'"